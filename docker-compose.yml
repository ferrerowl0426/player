services:
  postgres:
    image: postgres:16
    container_name: video_player_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_player
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: video_player_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_API_CORS_ALLOW_ORIGIN: ${FRONTEND_URL:-http://localhost:3001}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: video_player_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do sleep 1; done;
      mc mb --ignore-existing local/$${S3_BUCKET};
      mc anonymous set download local/$${S3_BUCKET};
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-videos}

  backend:
    build:
      context: ./backend
    container_name: video_player_backend
    restart: always
    depends_on:
      - postgres
      - minio
    environment:
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/video_player
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT}
      PUBLIC_BUCKET_BASE_URL: ${PUBLIC_BUCKET_BASE_URL}
    ports:
      - "3002:3000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3002/api}
    container_name: video_player_frontend
    restart: always
    depends_on:
      - backend
    environment:
      SERVER_API_BASE_URL: http://backend:3000/api
    ports:
      - "3001:3001"

volumes:
  postgres_data:
    name: video_player_postgres_data
  minio_data:
    name: video_player_minio_data
