services:
  postgres:
    image: postgres:16
    container_name: video_player_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_player
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  minio:
    image: minio/minio:latest
    container_name: video_player_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  create-bucket:
    image: minio/mc:latest
    container_name: video_player_create_bucket
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/videos;
      mc anonymous set download local/videos;
      exit 0;
      "

  backend:
    build:
      context: ./backend
    container_name: video_player_backend
    restart: always
    depends_on:
      - postgres
      - minio
      - create-bucket
    environment:
      PORT: 3000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/video_player
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: videos
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      PUBLIC_BUCKET_BASE_URL: ${PUBLIC_BUCKET_BASE_URL:-http://localhost:9000/videos}
    ports:
      - "3002:3000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3002/api}
    container_name: video_player_frontend
    restart: always
    depends_on:
      - backend
    environment:
      SERVER_API_BASE_URL: http://backend:3000/api
    ports:
      - "3001:3001"

volumes:
  postgres_data:
    external: true
    name: video_player_postgres_data
  minio_data:
    external: true
    name: video_player_minio_data
